<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie obrázků</title>

    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .images {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .images img {
            max-width: 45%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            background: white;
        }
    </style>
</head>
<body>

    <div class="images">
        <img src="Soutez_EBF_Baloun.png" alt="Soutez EBF Baloun">
        <img src="unnamed.webp" alt="Unnamed">
    </div>

</body>
</html>
