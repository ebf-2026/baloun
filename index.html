<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soutěž - Vinařství Baloun</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            font-family:'Poppins',sans-serif;
            background:
                radial-gradient(circle at top left,#7b1e3a 0%,transparent 35%),
                radial-gradient(circle at bottom right,#c89b3c 0%,transparent 30%),
                linear-gradient(135deg,#1c0f13 0%,#2b1620 50%,#12090d 100%);
            color:white;
            overflow-x:hidden;
            padding:40px 20px;
        }

        body::before{
            content:"";
            position:fixed;
            inset:0;
            background:linear-gradient(
                120deg,
                rgba(255,255,255,0.03),
                rgba(255,255,255,0)
            );
            animation:shine 8s linear infinite;
            pointer-events:none;
        }

        @keyframes shine{
            0%{
                transform:translateX(-100%);
            }
            100%{
                transform:translateX(100%);
            }
        }

        .container{
            max-width:1200px;
            margin:0 auto;
        }

        .hero{
            text-align:center;
            margin-bottom:40px;
        }

        .hero h1{
            font-size:56px;
            font-weight:700;
            margin-bottom:15px;
            background:linear-gradient(90deg,#fff,#f2d38a);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .hero p{
            color:rgba(255,255,255,0.75);
            font-size:18px;
            font-weight:300;
        }

        .viewer{
            position:relative;
            overflow:hidden;
            border-radius:28px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(12px);
            box-shadow:
                0 10px 40px rgba(0,0,0,0.35),
                inset 0 0 0 1px rgba(255,255,255,0.08);
        }

        .image-container{
            overflow:auto;
            width:100%;
            max-height:80vh;
            cursor:grab;
            scroll-behavior:smooth;
            background:#12090d;
        }

        .image-container:active{
            cursor:grabbing;
        }

        .image-wrapper{
            display:flex;
            justify-content:center;
            align-items:flex-start;
            min-width:100%;
            min-height:100%;
            padding:20px;
        }

        .image-wrapper img{
            width:100%;
            max-width:1000px;
            height:auto;
            transform-origin:top center;
            transition:transform .15s ease;
            user-select:none;
            -webkit-user-drag:none;
        }

        .controls{
            position:absolute;
            top:18px;
            right:18px;
            display:flex;
            gap:10px;
            z-index:10;
        }

        .controls button{
            width:46px;
            height:46px;
            border:none;
            border-radius:14px;
            background:rgba(0,0,0,0.55);
            color:white;
            font-size:24px;
            cursor:pointer;
            backdrop-filter:blur(10px);
            transition:0.2s ease;
        }

        .controls button:hover{
            background:rgba(200,155,60,0.9);
            transform:scale(1.06);
        }

        .hint{
            text-align:center;
            padding:16px;
            color:rgba(255,255,255,0.7);
            font-size:14px;
        }

        @media (max-width:768px){

            body{
                padding:20px 12px;
            }

            .hero h1{
                font-size:34px;
            }

            .hero p{
                font-size:15px;
            }

            .viewer{
                border-radius:20px;
            }

            .image-container{
                max-height:72vh;
            }

            .image-wrapper{
                padding:10px;
            }

            .controls button{
                width:40px;
                height:40px;
                font-size:20px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="hero">
        <h1>Soutěž - Vinařství Baloun</h1>
        <p>Zapojte se do soutěže a objevte kouzlo moravského vinařství.</p>
    </div>

    <div class="viewer">

        <div class="controls">
            <button id="zoomIn">+</button>
            <button id="zoomOut">−</button>
            <button id="reset">↺</button>
        </div>

        <div class="image-container" id="container">
            <div class="image-wrapper">
                <img
                    id="image"
                    src="Soutez_EBF_Baloun.png"
                    alt="Soutěž EBF Baloun"
                >
            </div>
        </div>

        <div class="hint">
            Přibliž kolečkem myši nebo pinch zoomem • Posouvání funguje normálně
        </div>

    </div>

</div>

<script>
    const image = document.getElementById("image");
    const container = document.getElementById("container");

    const zoomIn = document.getElementById("zoomIn");
    const zoomOut = document.getElementById("zoomOut");
    const reset = document.getElementById("reset");

    let scale = 1;

    function updateScale() {
        image.style.transform = `scale(${scale})`;
    }

    zoomIn.addEventListener("click", () => {
        scale += 0.25;
        if(scale > 5) scale = 5;
        updateScale();
    });

    zoomOut.addEventListener("click", () => {
        scale -= 0.25;
        if(scale < 1) scale = 1;
        updateScale();
    });

    reset.addEventListener("click", () => {
        scale = 1;
        updateScale();

        container.scrollTo({
            top:0,
            left:0,
            behavior:"smooth"
        });
    });

    container.addEventListener("wheel", (e) => {

        if(!e.ctrlKey) return;

        e.preventDefault();

        const delta = -e.deltaY * 0.01;

        scale += delta;

        if(scale < 1) scale = 1;
        if(scale > 5) scale = 5;

        updateScale();

    }, { passive:false });

    let startDistance = 0;

    container.addEventListener("touchstart", (e) => {

        if(e.touches.length === 2){

            startDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
        }

    }, { passive:true });

    container.addEventListener("touchmove", (e) => {

        if(e.touches.length === 2){

            e.preventDefault();

            const currentDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );

            const diff = currentDistance - startDistance;

            scale += diff * 0.003;

            if(scale < 1) scale = 1;
            if(scale > 5) scale = 5;

            updateScale();

            startDistance = currentDistance;
        }

    }, { passive:false });
</script>

</body>
</html>
