```html
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Soutěž - Vinařství Baloun</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            min-height:100vh;
            background:
                radial-gradient(circle at top left,#7b1e3a 0%,transparent 35%),
                radial-gradient(circle at bottom right,#c89b3c 0%,transparent 30%),
                linear-gradient(135deg,#1c0f13 0%,#2b1620 50%,#12090d 100%);
            color:white;
            overflow-x:hidden;
        }

        body::before{
            content:"";
            position:fixed;
            inset:0;
            background:
                linear-gradient(
                    120deg,
                    rgba(255,255,255,0.03),
                    rgba(255,255,255,0)
                );
            animation:shine 8s linear infinite;
            pointer-events:none;
        }

        @keyframes shine{
            from{
                transform:translateX(-100%);
            }
            to{
                transform:translateX(100%);
            }
        }

        .container{
            width:100%;
            max-width:1200px;
            margin:0 auto;
            padding:50px 20px;
        }

        .hero{
            text-align:center;
            margin-bottom:40px;
            animation:fadeDown 0.8s ease;
        }

        .hero h1{
            font-size:58px;
            font-weight:700;
            margin-bottom:15px;

            background:linear-gradient(90deg,#fff,#f2d38a);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .hero p{
            font-size:18px;
            color:rgba(255,255,255,0.72);
            font-weight:300;
        }

        .card{
            position:relative;
            overflow:hidden;

            border-radius:30px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(12px);

            box-shadow:
                0 15px 50px rgba(0,0,0,0.35),
                inset 0 0 0 1px rgba(255,255,255,0.08);

            animation:fadeUp 1s ease;
        }

        .image-link{
            display:block;
            text-decoration:none;
        }

        .image-link img{
            width:100%;
            display:block;
            height:auto;

            transition:
                transform .4s ease,
                filter .4s ease;
        }

        .image-link:hover img{
            transform:scale(1.02);
            filter:brightness(1.04);
        }

        .footer-text{
            text-align:center;
            margin-top:22px;

            color:rgba(255,255,255,0.65);

            font-size:14px;
        }

        @keyframes fadeDown{
            from{
                opacity:0;
                transform:translateY(-30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media (max-width:768px){

            .container{
                padding:25px 12px;
            }

            .hero{
                margin-bottom:25px;
            }

            .hero h1{
                font-size:34px;
                line-height:1.2;
            }

            .hero p{
                font-size:15px;
            }

            .card{
                border-radius:22px;
            }

            .image-link:hover img{
                transform:none;
                filter:none;
            }

            .footer-text{
                font-size:13px;
                margin-top:16px;
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="hero">
            <h1>Soutěž - Vinařství Baloun</h1>

            <p>
                Zapojte se do soutěže a objevte kouzlo moravského vinařství.
            </p>
        </div>

        <div class="card">

            <!-- Kliknutím se otevře obrázek normálně v plné velikosti -->
            <a
                href="Soutez_EBF_Baloun.png"
                target="_blank"
                class="image-link"
            >
                <img
                    src="Soutez_EBF_Baloun.png"
                    alt="Soutěž EBF Baloun"
                >
            </a>

        </div>

        <div class="footer-text">
            Klikni na obrázek pro otevření v plné velikosti
        </div>

    </div>

</body>
</html>
```
